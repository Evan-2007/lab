clusterName: homelab
talosVersion: v1.13.4
kubernetesVersion: v1.36.1
endpoint: https://192.168.20.10:6443

clusterPodNets:
  - 10.244.0.0/16
clusterSvcNets:
  - 10.96.0.0/12

cniConfig:
  name: none

controlPlane:
  patches:
    - |-
      cluster:
        allowSchedulingOnControlPlanes: true
        proxy:
          disabled: true
    - "@./patches/cilium.sops.yaml"  

nodes:
  - hostname: talos-cp
    ipAddress: 192.168.20.10
    installDisk: /dev/sda
    controlPlane: true

  - hostname: talos-worker1
    ipAddress: 192.168.20.11
    installDisk: /dev/sda
    controlPlane: true

  - hostname: talos-worker2
    ipAddress: 192.168.20.12
    installDisk: /dev/sda
    controlPlane: true