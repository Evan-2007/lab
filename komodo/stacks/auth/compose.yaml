services:
  tinyauth:
    image: ghcr.io/tinyauthapp/tinyauth
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - TINYAUTH_APPURL=${TINYAUTH_APPURL}
      - TINYAUTH_AUTH_USERS=${TINYAUTH_AUTH_USERS}
    # labels:
    #   traefik.enable: true
    #   traefik.http.routers.tinyauth.rule: Host(`tinyauth.example.com`)
    #   traefik.http.middlewares.tinyauth.forwardauth.address: http://tinyauth:3000/api/auth/traefik

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    ports:
      - 1411:1411
    volumes:
      - "pocket-id-data:/app/data"
    # Optional healthcheck
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    environment:
      - APP_URL=${POCKET_ID_APP_URL}
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
      - TRUST_PROXY=${POCKET_ID_TRUST_PROXY:-false}
      - PUID=${POCKET_ID_PUID:-1000}
      - PGID=${POCKET_ID_PGID:-1000}

volumes:
  pocket-id-data:
